<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Check</title>

    <style>
        :root {
            --primary: #023052;
            --secondary: #ffcc00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary), #01406d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            background: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 3rem;
            font-weight: bold;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 35px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .download-btn {
            display: inline-block;
            background: var(--secondary);
            color: var(--primary);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 16px 40px;
            border-radius: 50px;
            transition: 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 204, 0, 0.4);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 204, 0, 0.6);
        }

        .version {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        footer {
            margin-top: 40px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .download-btn {
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="logo">✓</div>

        <h1>Academic Check</h1>

        <p>
            Descarga la última versión de la aplicación y comienza a utilizar
            Academic Check desde tu dispositivo Android.
        </p>

        <a
            class="download-btn"
            href="https://github.com/arlysanchez/academic-check/releases/latest/download/app-release.apk"
            download>
            📱 Descargar APK
        </a>

        <div class="version">
            Última versión disponible
        </div>

        <footer>
            © 2025 Academic Check
        </footer>

    </div>

</body>
</html>
